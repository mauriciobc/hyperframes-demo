name: Render Video

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Render Video
        run: npm run render -- --docker
        
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: '*.mp4'
