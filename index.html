<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@700&display=swap');
      
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0a0a; font-family: 'Space Grotesk', sans-serif; }
      
      .scene {
        position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; overflow: hidden;
        display: flex; flex-direction: column; justify-content: center; padding: 120px;
      }
      
      /* Colors: Black #0a0a0a, White #ffffff, Red #E63946, Yellow #FFD60A */
      #scene1 { z-index: 1; background: #0a0a0a; color: #ffffff; }
      #scene2 { z-index: 2; background: #E63946; color: #0a0a0a; opacity: 0; }
      #scene3 { z-index: 3; background: #FFD60A; color: #0a0a0a; opacity: 0; }
      #scene4 { z-index: 4; background: #0a0a0a; color: #ffffff; opacity: 0; align-items: center; text-align: center; }

      /* Typography classes */
      .anton-huge { font-family: 'Anton', sans-serif; font-size: 22rem; line-height: 0.85; text-transform: uppercase; letter-spacing: -0.02em; }
      .anton-large { font-family: 'Anton', sans-serif; font-size: 14rem; line-height: 0.9; text-transform: uppercase; }
      .grotesk-sub { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; font-weight: 700; text-transform: uppercase; }
      
      /* Layout 1: The Bleed (Text extending off-canvas) */
      #s1-t1 { color: #E63946; position: absolute; top: 180px; left: -20px; width: 2200px; white-space: nowrap; }
      #s1-t2 { color: #FFD60A; position: absolute; top: 520px; right: 80px; }
      #s1-sub { position: absolute; bottom: 120px; left: 120px; color: #ffffff; }

      /* Layout 2: The Grid/Stat Block */
      #scene2 { flex-direction: row; align-items: center; justify-content: space-between; padding: 0 160px; }
      .s2-left { display: flex; flex-direction: column; }
      .s2-right { display: flex; flex-direction: column; gap: 20px; border-left: 12px solid #0a0a0a; padding-left: 80px; }
      #s2-stat { font-size: 28rem; color: #ffffff; }

      /* Layout 3: The Split Screen */
      #scene3 { display: grid; grid-template-columns: 1fr 1fr; padding: 0; }
      .s3-col { display: flex; flex-direction: column; justify-content: center; padding: 120px; height: 100%; }
      .s3-left { background: #FFD60A; }
      .s3-right { background: #E63946; color: #ffffff; }

      /* Layout 4: The Minimalist Punch */
      .s4-box { display: flex; flex-direction: column; align-items: center; width: 100%; }
      #s4-h1 { color: #FFD60A; font-size: 14rem; margin-bottom: -40px; }
      #s4-h2 { color: #E63946; font-size: 14rem; }

    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1920" data-height="1080">
      
      <!-- SCENE 1 -->
      <div id="scene1" class="scene">
        <div class="anton-huge" id="s1-t1">THE LIQUIDITY</div>
        <div class="anton-huge" id="s1-t2">TRAP</div>
        <div class="grotesk-sub" id="s1-sub">A B3 SURVIVAL PROTOCOL</div>
      </div>

      <!-- SCENE 2 -->
      <div id="scene2" class="scene">
        <div class="s2-left">
          <div class="grotesk-sub" id="s2-l1" style="margin-bottom: -20px;">THE BAIT</div>
          <div class="anton-huge" id="s2-stat">+60%</div>
        </div>
        <div class="s2-right">
          <div class="anton-large" id="s2-r1">DAILY</div>
          <div class="anton-large" id="s2-r2">GAIN</div>
          <div class="grotesk-sub" id="s2-r3" style="color: #ffffff;">ZERO VOLUME</div>
        </div>
      </div>

      <!-- SCENE 3 -->
      <div id="scene3" class="scene">
        <div class="s3-col s3-left">
          <div class="grotesk-sub" id="s3-l1" style="margin-bottom: 40px;">YOU CAN</div>
          <div class="anton-large" id="s3-l2">BUY</div>
          <div class="anton-large" id="s3-l3">IN</div>
        </div>
        <div class="s3-col s3-right">
          <div class="grotesk-sub" id="s3-r1" style="margin-bottom: 40px;">BUT YOU</div>
          <div class="anton-large" id="s3-r2" style="color: #0a0a0a;">CAN NEVER</div>
          <div class="anton-large" id="s3-r3" style="color: #0a0a0a;">SELL</div>
        </div>
      </div>

      <!-- SCENE 4 -->
      <div id="scene4" class="scene">
        <div class="s4-box">
          <div class="anton-huge" id="s4-h1">BORING PAYS.</div>
          <div class="anton-huge" id="s4-h2">EXCITEMENT LIQUIDATES.</div>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // SCENE 1 (0s to 3s)
      tl.from("#s1-t1", { x: -1000, skewX: 20, opacity: 0, duration: 0.6, ease: "expo.out" }, 0.2);
      tl.from("#s1-t2", { x: 1000, skewX: -20, opacity: 0, duration: 0.6, ease: "expo.out" }, 0.3);
      tl.from("#s1-sub", { y: 100, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 0.6);

      // TRANSITION 1 -> 2 (Vertical split/slam) at 3s
      tl.set("#scene2", { opacity: 1 }, 3.0);
      tl.from("#scene2", { scaleY: 0, transformOrigin: "bottom", duration: 0.5, ease: "power4.inOut" }, 3.0);
      
      // SCENE 2 (3s to 6s)
      tl.from("#s2-l1", { y: -50, opacity: 0, duration: 0.4, ease: "power3.out" }, 3.3);
      tl.from("#s2-stat", { scale: 3, opacity: 0, duration: 0.5, ease: "back.out(1.8)" }, 3.4);
      tl.from("#s2-r1", { x: 200, opacity: 0, duration: 0.4, ease: "expo.out" }, 3.5);
      tl.from("#s2-r2", { x: 200, opacity: 0, duration: 0.4, ease: "expo.out" }, 3.6);
      tl.from("#s2-r3", { y: 50, opacity: 0, duration: 0.4, ease: "power3.out" }, 3.7);

      // TRANSITION 2 -> 3 (Horizontal wipe/split) at 6s
      tl.set("#scene3", { opacity: 1 }, 6.0);
      tl.from(".s3-left", { xPercent: -100, duration: 0.5, ease: "expo.inOut" }, 6.0);
      tl.from(".s3-right", { xPercent: 100, duration: 0.5, ease: "expo.inOut" }, 6.0);
      tl.to("#scene2", { scale: 0.9, opacity: 0, duration: 0.5, ease: "expo.inOut" }, 6.0);
      tl.set("#scene2", { visibility: "hidden" }, 6.5);

      // SCENE 3 (6s to 9s)
      tl.from("#s3-l1", { y: 50, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 6.4);
      tl.from("#s3-l2", { y: 100, opacity: 0, duration: 0.4, ease: "expo.out" }, 6.5);
      tl.from("#s3-l3", { y: 100, opacity: 0, duration: 0.4, ease: "expo.out" }, 6.6);
      
      tl.from("#s3-r1", { y: -50, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 6.5);
      tl.from("#s3-r2", { x: 100, opacity: 0, duration: 0.4, ease: "expo.out" }, 6.6);
      tl.from("#s3-r3", { x: 100, opacity: 0, duration: 0.4, ease: "expo.out" }, 6.7);

      // TRANSITION 3 -> 4 (Zoom out shatter) at 9s
      tl.set("#scene4", { opacity: 1 }, 9.0);
      tl.to("#scene3", { scale: 3, opacity: 0, duration: 0.6, ease: "power3.in" }, 9.0);
      tl.set("#scene3", { visibility: "hidden" }, 9.6);
      tl.from("#scene4", { scale: 0.8, duration: 0.6, ease: "power3.out" }, 9.4);

      // SCENE 4 (9s to 12s)
      tl.from("#s4-h1", { y: -100, rotation: -2, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 9.6);
      tl.from("#s4-h2", { y: 100, rotation: 2, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 9.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
